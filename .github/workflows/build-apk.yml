name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: WildlifeTracker/package-lock.json

    - name: Install dependencies
      run: |
        cd WildlifeTracker
        npm ci

    - name: Build APK with Expo
      run: |
        cd WildlifeTracker
        npx expo build:android --type apk
      env:
        EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        CI: 1

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: wildlife-tracker-apk
        path: WildlifeTracker/dist/*.apk