name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install EAS CLI
      run: npm install -g eas-cli

    - name: Configure EAS project
      run: |
        cd WildlifeTracker
        echo '{"projectId": "wildlife-tracker-4d28b"}' > .eas/project.json

    - name: Build APK with EAS
      run: |
        cd WildlifeTracker
        eas build -p android --profile preview --non-interactive --no-wait
      env:
        EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    - name: Build Info
      run: |
        echo "APK build started!"
        echo "Check: https://expo.dev/accounts/[your-account]/projects/wildlife-tracker/builds"