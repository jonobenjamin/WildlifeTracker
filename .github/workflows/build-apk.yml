name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: WildlifeTracker/package-lock.json

    - name: Install dependencies
      run: |
        cd WildlifeTracker
        npm ci

    - name: Install EAS CLI
      run: npm install -g eas-cli

    - name: Build APK with EAS
      run: |
        cd WildlifeTracker
        eas build -p android --profile preview --non-interactive --no-wait
      env:
        EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    - name: Output build info
      run: |
        echo "APK build started with EAS Build!"
        echo "Check your Expo dashboard for download links:"
        echo "https://expo.dev/accounts/[your-account]/projects/wildlife-tracker/builds"