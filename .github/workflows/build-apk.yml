name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        cd WildlifeTracker
        npm ci

    - name: Setup EAS
      run: npm install -g @expo/cli eas-cli

    - name: Login to Expo
      run: |
        cd WildlifeTracker
        npx expo login -u ${{ secrets.EXPO_USERNAME }} -p ${{ secrets.EXPO_PASSWORD }}

    - name: Build APK with Expo
      run: |
        cd WildlifeTracker
        CI=1 npx expo build:android --type apk --no-publish
      env:
        CI: 1

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: wildlife-tracker-apk
        path: WildlifeTracker/dist/*.apk