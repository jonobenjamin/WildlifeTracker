name: Test App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: |
        cd WildlifeTracker
        npm ci

    - name: Check TypeScript
      run: |
        cd WildlifeTracker
        npx tsc --noEmit

    - name: Lint code
      run: |
        cd WildlifeTracker
        npx eslint . --ext .ts,.tsx